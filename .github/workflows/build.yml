name: Build kreuzberg wheel (macOS)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14          # Apple Silicon M1
    timeout-minutes: 180

    steps:
      - name: Clone kreuzberg (fork with PdfBackend exposed)
        run: git clone --depth 1 --branch feat/expose-pdf-backend https://github.com/gvaxx/kreuzberg.git

      - name: Build macOS wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -i python3.12 --out ../../target/wheels
          target: aarch64-apple-darwin
          working-directory: kreuzberg/packages/python

      - name: List wheels
        run: ls -lh kreuzberg/target/wheels/

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: kreuzberg-wheel-macos
          path: kreuzberg/target/wheels/*.whl
