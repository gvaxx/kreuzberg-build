name: Build kreuzberg wheel (macOS)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14          # Apple Silicon M1
    timeout-minutes: 180

    steps:
      - name: Clone kreuzberg v4.8.3
        run: git clone --depth 1 --branch v4.8.3 https://github.com/kreuzberg-dev/kreuzberg.git

      - name: Enable pdf-oxide feature
        run: |
          sed -i '' 's/"bundled-pdfium", "full"/"bundled-pdfium", "full", "pdf-oxide"/' \
            kreuzberg/crates/kreuzberg-py/Cargo.toml
          grep 'pdf-oxide' kreuzberg/crates/kreuzberg-py/Cargo.toml

      - name: Build macOS wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -i python3.12 --out ../../target/wheels
          target: aarch64-apple-darwin
          working-directory: kreuzberg/packages/python

      - name: List wheels
        run: ls -lh kreuzberg/target/wheels/

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: kreuzberg-wheel-macos
          path: kreuzberg/target/wheels/*.whl
