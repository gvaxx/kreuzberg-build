name: Build kreuzberg wheel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Maximize build disk space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 2048
          temp-reserve-mb: 512
          swap-size-mb: 4096
          overprovision-lvm: 'true'
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Clone kreuzberg v4.6.3
        run: |
          git clone --depth 1 --branch v4.6.3 https://github.com/kreuzberg-dev/kreuzberg.git
          echo "KREUZBERG_DIR=$(pwd)/kreuzberg" >> $GITHUB_ENV

      - name: Build Linux wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -i python3.10 --out ../../target/wheels
          target: x86_64-unknown-linux-gnu
          manylinux: manylinux_2_28
          working-directory: kreuzberg/packages/python
          before-script-linux: |
            set -euo pipefail
            rustup component add rust-src || true
            yum install -y openssl openssl-devel pkgconfig
            export OPENSSL_LIB_DIR=/usr/lib64
            export OPENSSL_INCLUDE_DIR=/usr/include
            echo "=== Building CLI Binary ==="
            cargo build --release --package kreuzberg-cli --features all
            mkdir -p kreuzberg
            cp ../../target/release/kreuzberg kreuzberg/kreuzberg-cli

      - name: List wheels
        run: ls -lh kreuzberg/target/wheels/

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: kreuzberg-wheel
          path: kreuzberg/target/wheels/*.whl
